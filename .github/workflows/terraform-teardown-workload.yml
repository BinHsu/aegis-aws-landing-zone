name: Terraform Teardown (Workload)

# workflow_dispatch-only. Destroys cost-incurring workload layers for a
# specified environment. Gated by the `workload-teardown` GitHub Environment
# which requires an explicit approval click by the operator.
#
# End-of-session command:
#   gh workflow run terraform-teardown-workload.yml -f env=staging
#   gh run watch   # approve when prompted in UI
#
# Destruction order (reverse of apply):
#   workloads → platform → network
#
# Preserves bootstrap layer, shared services, all other accounts.
# Equivalent in scope to scripts/teardown/soft-teardown-workload.sh.

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Workload environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: "eu-central-1"

jobs:
  destroy-workloads:
    name: Destroy ${{ inputs.env }}/workloads
    runs-on: ubuntu-latest
    environment: workload-teardown

    steps:
      - uses: actions/checkout@v4

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/workloads" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::workloads layer does not exist for ${{ inputs.env }} — skipping"
          fi

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/workloads
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/workloads
        run: terraform destroy -auto-approve -input=false -no-color

  # No `environment:` — approval was granted at destroy-workloads. Subsequent
  # layers run automatically once the session-level gate opens.
  destroy-platform:
    name: Destroy ${{ inputs.env }}/platform
    needs: destroy-workloads
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Safety-net sweep: terminate any EC2 instance tagged as Karpenter-
      # provisioned before Terraform runs. Normally Karpenter drains these
      # itself when NodePool is deleted (handled by a local-exec provisioner
      # on kubectl_manifest.karpenter_default_nodepool). But if state has
      # drifted (e.g., a prior `terraform state rm` recovery), Terraform
      # won't even attempt that deprovision — orphan EC2 then blocks subnet
      # delete in the network layer. This sweep is the unconditional catch.
      # See docs/incidents.md Incident 19.
      - name: Sweep orphan Karpenter-provisioned EC2 instances
        run: |
          IDS=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag-key,Values=karpenter.sh/nodepool" \
                      "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          if [ -n "$IDS" ]; then
            echo "::notice::Terminating orphan Karpenter instances: $IDS"
            aws ec2 terminate-instances --region ${{ env.AWS_REGION }} --instance-ids $IDS
            aws ec2 wait instance-terminated --region ${{ env.AWS_REGION }} --instance-ids $IDS
          else
            echo "::notice::No orphan Karpenter-tagged EC2 instances found."
          fi

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/platform" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::platform layer does not exist for ${{ inputs.env }} — skipping"
          fi

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/platform
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/platform
        run: terraform destroy -auto-approve -input=false -no-color

  # No `environment:` — see destroy-platform rationale.
  destroy-network:
    name: Destroy ${{ inputs.env }}/network
    needs: destroy-platform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Safety-net sweep: delete EKS-auto-created security groups in the
      # target VPC before Terraform tries to destroy the VPC itself. EKS
      # creates a cluster SG (tagged aws:eks:cluster-name) that is NOT
      # managed by any Terraform resource — AWS is supposed to clean it up
      # when the cluster is deleted, but this can race/fail leaving the
      # VPC with a DependencyViolation on destroy. Pre-deleting these
      # orphan SGs lets Terraform's VPC destroy proceed cleanly.
      # See docs/incidents.md Incident 20.
      - name: Sweep orphan EKS security groups in target VPC
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Name,Values=${{ inputs.env }}-vpc" \
            --query 'Vpcs[0].VpcId' --output text 2>/dev/null || echo "None")
          if [ "$VPC_ID" = "None" ] || [ -z "$VPC_ID" ] || [ "$VPC_ID" = "null" ]; then
            echo "::notice::VPC for ${{ inputs.env }} does not exist; nothing to sweep."
            exit 0
          fi
          echo "::notice::Sweeping orphan EKS SGs in VPC $VPC_ID"
          SG_IDS=$(aws ec2 describe-security-groups \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=vpc-id,Values=$VPC_ID" \
                      "Name=tag-key,Values=aws:eks:cluster-name" \
            --query 'SecurityGroups[].GroupId' \
            --output text)
          for SG in $SG_IDS; do
            echo "::notice::Deleting orphan EKS SG $SG"
            aws ec2 delete-security-group --region ${{ env.AWS_REGION }} --group-id "$SG" || true
          done

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/network" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::network layer does not exist for ${{ inputs.env }} — skipping"
          fi

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/network
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/network
        run: terraform destroy -auto-approve -input=false -no-color
