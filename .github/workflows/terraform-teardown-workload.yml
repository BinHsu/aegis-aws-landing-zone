name: Terraform Teardown (Workload)

# workflow_dispatch-only. Destroys cost-incurring workload layers for a
# specified environment. Gated by the `workload-teardown` GitHub Environment
# which requires an explicit approval click by the operator.
#
# End-of-session command:
#   gh workflow run terraform-teardown-workload.yml -f env=staging
#   gh run watch   # approve when prompted in UI
#
# Destruction order (reverse of apply):
#   observability → workloads → platform → network
#
# Observability-first ensures grafana-operator finalizers on GrafanaDashboard /
# GrafanaContactPoint / GrafanaNotificationPolicy* CRDs complete cleanly —
# finalizers call Grafana Cloud API to remove the remote resources, so
# skipping this step leaves orphan dashboards + contact points on the GC
# stack (ADR-022 §Teardown). Destroying grafana-operator's helm_release
# before CRD deletion would strand the finalizers forever.
#
# Preserves bootstrap layer, shared services, all other accounts.
# Equivalent in scope to scripts/teardown/soft-teardown-workload.sh.

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Workload environment to destroy"
        required: true
        type: choice
        options:
          - staging
          - prod

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: "eu-central-1"

jobs:
  # Observability first — grafana-operator CRD finalizers must run while the
  # operator pod is still alive, or else GrafanaDashboard / GrafanaContactPoint
  # / GrafanaNotificationPolicy* resources leak on the Grafana Cloud side
  # (ADR-022 §Teardown). Pre-delete step runs kubectl delete + finalizer wait
  # before terraform destroy removes grafana-operator's helm_release.
  destroy-observability:
    name: Destroy ${{ inputs.env }}/observability
    runs-on: ubuntu-latest
    environment: workload-teardown

    steps:
      - uses: actions/checkout@v6

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/gh-tf-teardown-workload
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/observability" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::observability layer does not exist for ${{ inputs.env }} — skipping"
          fi

      # Pre-delete stage: remove all grafana-operator-managed CRDs first so
      # finalizers run while the operator pod is still alive. Two-minute wait
      # matches ADR-022 §Teardown — long enough for Grafana Cloud API calls
      # to complete, short enough not to stall the teardown if a finalizer
      # is stuck.
      #
      # All commands tolerant of "cluster already gone" / "CRD not found" —
      # teardown must be idempotent across re-runs after partial failures.
      - name: Pre-delete grafana-operator CRDs (finalizer flush)
        if: steps.exists.outputs.exists == 'true'
        run: |
          CLUSTER_NAME=$(aws eks list-clusters \
            --region ${{ env.AWS_REGION }} \
            --query "clusters[?contains(@, 'primary')] | [0]" \
            --output text 2>/dev/null || echo "None")
          if [ "$CLUSTER_NAME" = "None" ] || [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" = "null" ]; then
            echo "::notice::No primary EKS cluster found — skipping CRD pre-delete (cluster may already be gone)."
            exit 0
          fi
          if ! aws eks update-kubeconfig \
                 --region ${{ env.AWS_REGION }} --name "$CLUSTER_NAME" 2>/dev/null; then
            echo "::notice::Could not fetch kubeconfig — skipping CRD pre-delete."
            exit 0
          fi

          # Delete order: leaf resources first, then the Grafana CRD (target
          # stack config) last. Mute timings + notification policies can be
          # gone before dashboards — they're all independently finalized.
          echo "::notice::Deleting grafana-operator-managed CRs across all namespaces..."
          for kind in grafanadashboard grafanacontactpoint grafananotificationpolicyroute grafananotificationpolicy grafanamutetiming; do
            kubectl delete "$kind" --all -A --timeout=2m --ignore-not-found 2>/dev/null || true
          done

          # Grafana CRD last. Deleting it while dashboards still existed
          # would race finalizers against the operator's "target stack" state
          # loss.
          kubectl delete grafana --all -A --timeout=1m --ignore-not-found 2>/dev/null || true

          # Belt-and-braces: poll for CRD cleanup completion up to 2 minutes.
          echo "::notice::Waiting for finalizers to flush (up to 2 min)..."
          for i in $(seq 1 12); do
            REMAINING=$(kubectl get grafanadashboard,grafanacontactpoint,grafananotificationpolicyroute,grafananotificationpolicy,grafana -A --no-headers 2>/dev/null | wc -l | tr -d ' ')
            if [ "$REMAINING" = "0" ]; then
              echo "::notice::All grafana-operator CRs flushed."
              exit 0
            fi
            echo "::notice::$REMAINING CRs still present; waiting 10s (attempt $i/12)"
            sleep 10
          done
          echo "::warning::CRD finalizers did not complete within 2m. Proceeding with teardown — Grafana Cloud side may have orphan resources (remove manually via GC portal)."

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/observability
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/observability
        run: terraform destroy -auto-approve -input=false -no-color

  # No `environment:` — approval was granted at destroy-observability.
  # Subsequent layers run automatically once the session-level gate opens.
  destroy-workloads:
    name: Destroy ${{ inputs.env }}/workloads
    needs: destroy-observability
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/gh-tf-teardown-workload
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/workloads" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::workloads layer does not exist for ${{ inputs.env }} — skipping"
          fi

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/workloads
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/workloads
        run: terraform destroy -auto-approve -input=false -no-color

  # No `environment:` — approval was granted at destroy-observability. Subsequent
  # layers run automatically once the session-level gate opens.
  destroy-platform:
    name: Destroy ${{ inputs.env }}/platform
    needs: destroy-workloads
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/gh-tf-teardown-workload
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Quiesce Karpenter cleanly BEFORE terraform destroy runs. Two-phase:
      #
      #   1. Drain NodePools — `kubectl delete nodepool --all` triggers
      #      Karpenter (still running) to delete all its NodeClaims, which
      #      gracefully terminates the EC2 instances it manages.
      #   2. Scale Karpenter to 0 — once NodeClaims are gone, scale the
      #      controller Deployment to 0 so nothing can spawn new EC2
      #      capacity during the remainder of destroy.
      #
      # Without step 2, Terraform's destroy of helm_release.karpenter is
      # racy: `helm uninstall` submits pod-delete asynchronously and
      # returns before the Karpenter pod has actually terminated. Terraform
      # then parallelizes onward to destroy aws_eks_fargate_profile.karpenter,
      # which force-kills the still-terminating Karpenter pod mid-finalize.
      # Any NodeClaim whose reconciliation was in flight at that moment
      # leaks its EC2 — and that EC2 blocks subnet destroy later.
      #
      # The existing `provisioner "local-exec"` on the NodePool is the
      # equivalent fix for local operators (runbook 002), but in CI it is
      # effectively a no-op because the runner has no kubeconfig and the
      # `|| true` swallows the kubectl "no context" error. This step is
      # the CI-side equivalent; together they cover both code paths.
      #
      # See docs/incidents.md Incident 22 for the detection story.
      - name: Quiesce Karpenter before destroy
        run: |
          CLUSTER_NAME=$(aws eks list-clusters \
            --region ${{ env.AWS_REGION }} \
            --query "clusters[0]" --output text 2>/dev/null || echo "None")
          if [ "$CLUSTER_NAME" = "None" ] || [ -z "$CLUSTER_NAME" ] || [ "$CLUSTER_NAME" = "null" ]; then
            echo "::notice::No EKS cluster in account — skipping Karpenter quiesce."
            exit 0
          fi
          if ! aws eks update-kubeconfig \
                 --region ${{ env.AWS_REGION }} --name "$CLUSTER_NAME" 2>/dev/null; then
            echo "::notice::Could not fetch kubeconfig — skipping Karpenter quiesce."
            exit 0
          fi
          # Step 1: delete NodePools, wait for Karpenter to drain NodeClaims
          # (→ EC2 instances terminate gracefully).
          echo "::notice::Draining Karpenter NodePools..."
          kubectl delete nodepool --all --timeout=10m 2>/dev/null || true
          kubectl wait --for=delete nodeclaim --all --timeout=10m 2>/dev/null || true
          # Step 2: scale the controller to 0 so no new NodeClaims can be
          # created during the rest of destroy.
          echo "::notice::Scaling Karpenter controller to 0 replicas..."
          kubectl scale deployment karpenter -n karpenter --replicas=0 2>/dev/null || true
          kubectl wait --for=delete pod \
            -l app.kubernetes.io/name=karpenter -n karpenter --timeout=5m 2>/dev/null || true

      # Safety-net sweep: terminate any EC2 instance tagged as Karpenter-
      # provisioned before Terraform runs. The quiesce step above should
      # normally make this a no-op, but if the quiesce failed (cluster
      # already gone, access-entry drift, state-rm recovery), this catches
      # what's left. See docs/incidents.md Incident 19.
      - name: Sweep orphan Karpenter-provisioned EC2 instances
        run: |
          IDS=$(aws ec2 describe-instances \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag-key,Values=karpenter.sh/nodepool" \
                      "Name=instance-state-name,Values=running,pending,stopping,stopped" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)
          if [ -n "$IDS" ]; then
            echo "::notice::Terminating orphan Karpenter instances: $IDS"
            aws ec2 terminate-instances --region ${{ env.AWS_REGION }} --instance-ids $IDS
            aws ec2 wait instance-terminated --region ${{ env.AWS_REGION }} --instance-ids $IDS
          else
            echo "::notice::No orphan Karpenter-tagged EC2 instances found."
          fi

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/platform" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::platform layer does not exist for ${{ inputs.env }} — skipping"
          fi

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/platform
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/platform
        run: terraform destroy -auto-approve -input=false -no-color

  # No `environment:` — see destroy-platform rationale.
  destroy-network:
    name: Destroy ${{ inputs.env }}/network
    needs: destroy-platform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - name: Resolve target account ID
        id: acct
        run: |
          ACCOUNT_ID=$(python3 -c "
          import yaml
          c = yaml.safe_load(open('config/landing-zone.yaml'))
          print(c['accounts']['${{ inputs.env }}']['id'])
          ")
          echo "account_id=${ACCOUNT_ID}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ steps.acct.outputs.account_id }}:role/gh-tf-teardown-workload
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Safety-net sweep: clear EKS-auto-created network interfaces and
      # security groups in the target VPC before Terraform tries to destroy
      # the VPC. EKS creates a cluster SG (tagged aws:eks:cluster-name) and
      # control-plane ENIs that are NOT managed by any Terraform resource —
      # AWS releases them asynchronously after the cluster is deleted, and
      # any ENI still in the `available` state will block SG delete, which
      # in turn blocks subnet delete with DependencyViolation.
      #
      # Order matters: ENIs first, then SGs. Reverse order hits the exact
      # DependencyViolation that the sweep exists to prevent.
      #
      # Fail loudly: if the sweep cannot clear a resource, the step exits
      # non-zero instead of masking the error with `|| true`. A silent
      # sweep-failure was the root cause of Incident 30 — the step claimed
      # success while AWS was rejecting the delete.
      #
      # See docs/incidents.md Incidents 20 + 30.
      - name: Sweep orphan EKS ENIs + security groups in target VPC
        run: |
          set -eo pipefail

          # Filter by component tags rather than by Name tag: PR-c (#84)
          # refactored the VPC name from `<env>-vpc` to `<env>-<region_key>-vpc`
          # (e.g. `staging-primary-vpc`). Matching on Name alone would silently
          # return no VPC and skip the sweep. The component-tag filter also
          # matches multi-region VPCs (primary + slave_1) — the for-loop below
          # iterates across all matched VPC IDs so both regions get swept.
          VPC_IDS=$(aws ec2 describe-vpcs \
            --region ${{ env.AWS_REGION }} \
            --filters "Name=tag:Project,Values=landing-zone-lab" \
                      "Name=tag:Environment,Values=${{ inputs.env }}" \
                      "Name=tag:Component,Values=network" \
            --query 'Vpcs[].VpcId' --output text 2>/dev/null || echo "")
          if [ -z "$VPC_IDS" ]; then
            echo "::notice::No VPCs tagged for ${{ inputs.env }}/network in this region; nothing to sweep."
            exit 0
          fi

          for VPC_ID in $VPC_IDS; do
            echo "::notice::Sweeping VPC $VPC_ID"

            # Step 1: delete orphan ENIs (status=available). These are the
            # control-plane ENIs AWS hasn't reclaimed yet after cluster delete.
            ENI_IDS=$(aws ec2 describe-network-interfaces \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" \
                        "Name=status,Values=available" \
              --query 'NetworkInterfaces[].NetworkInterfaceId' \
              --output text)
            for ENI in $ENI_IDS; do
              echo "::notice::Deleting orphan ENI $ENI"
              if ! aws ec2 delete-network-interface \
                     --region ${{ env.AWS_REGION }} \
                     --network-interface-id "$ENI" 2> /tmp/eni-err.log; then
                echo "::error::Failed to delete ENI $ENI:"
                cat /tmp/eni-err.log
                exit 1
              fi
            done

            # Step 2: delete orphan EKS cluster SGs (tagged aws:eks:cluster-name).
            SG_IDS=$(aws ec2 describe-security-groups \
              --region ${{ env.AWS_REGION }} \
              --filters "Name=vpc-id,Values=$VPC_ID" \
                        "Name=tag-key,Values=aws:eks:cluster-name" \
              --query 'SecurityGroups[].GroupId' \
              --output text)
            for SG in $SG_IDS; do
              echo "::notice::Deleting orphan EKS SG $SG"
              if ! aws ec2 delete-security-group \
                     --region ${{ env.AWS_REGION }} \
                     --group-id "$SG" 2> /tmp/sg-err.log; then
                echo "::error::Failed to delete SG $SG:"
                cat /tmp/sg-err.log
                exit 1
              fi
            done

            # Step 3: verify no available-state ENIs remain before handing off
            # to terraform destroy. Control-plane ENI reclaim is asynchronous;
            # poll for up to 5 minutes.
            echo "::notice::Verifying VPC $VPC_ID is clear of available ENIs"
            for i in $(seq 1 30); do
              REMAINING=$(aws ec2 describe-network-interfaces \
                --region ${{ env.AWS_REGION }} \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                          "Name=status,Values=available" \
                --query 'length(NetworkInterfaces)' --output text)
              if [ "$REMAINING" = "0" ]; then
                break
              fi
              echo "::notice::$REMAINING ENIs still available in VPC $VPC_ID; waiting 10s (attempt $i/30)"
              sleep 10
            done
            if [ "$REMAINING" != "0" ]; then
              echo "::error::VPC $VPC_ID still has $REMAINING available ENIs after 5m; aborting teardown"
              aws ec2 describe-network-interfaces \
                --region ${{ env.AWS_REGION }} \
                --filters "Name=vpc-id,Values=$VPC_ID" \
                          "Name=status,Values=available" \
                --query 'NetworkInterfaces[].[NetworkInterfaceId,Description,Groups[].GroupName]' \
                --output text
              exit 1
            fi
          done

      - name: Check layer exists
        id: exists
        run: |
          if [[ -d "terraform/environments/${{ inputs.env }}/network" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::network layer does not exist for ${{ inputs.env }} — skipping"
          fi

      - name: Terraform Init
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/network
        run: terraform init -input=false

      - name: Terraform Destroy
        if: steps.exists.outputs.exists == 'true'
        working-directory: terraform/environments/${{ inputs.env }}/network
        run: terraform destroy -auto-approve -input=false -no-color
