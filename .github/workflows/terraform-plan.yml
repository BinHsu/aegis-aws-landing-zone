name: Terraform Plan

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.14.8"
  AWS_REGION: "eu-central-1"

jobs:
  plan:
    name: Plan ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: management/bootstrap
            account_id: "186052668286"
          - env: management/scps
            account_id: "186052668286"
          - env: shared/bootstrap
            account_id: "345895787808"
          - env: shared/ipam
            account_id: "345895787808"
          - env: staging/bootstrap
            account_id: "251774439261"
          - env: staging/network
            account_id: "251774439261"

    steps:
      - uses: actions/checkout@v4

      - name: Write config
        run: |
          mkdir -p config
          cat <<'EOFCONFIG' > config/landing-zone.yaml
          ${{ secrets.LANDING_ZONE_CONFIG }}
          EOFCONFIG

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ matrix.account_id }}:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.env }}
        run: terraform init -input=false

      - name: Terraform Plan
        working-directory: terraform/environments/${{ matrix.env }}
        id: plan
        # -lock-timeout=10m serializes concurrent plans that hit the same state
        # file. Triggered by Dependabot bulk rebases (Incident 23 aftermath): 10
        # PRs rebased within seconds → 10 matrix runs race for the same S3 lock
        # → 9 fail immediately with default -lock-timeout=0. 10 min is generous
        # for plan (plan itself runs ~30s), negligible in the no-contention case.
        run: terraform plan -no-color -input=false -detailed-exitcode -lock-timeout=10m
        continue-on-error: true

      - name: Determine plan status
        id: status
        run: |
          if [ "${{ steps.plan.outcome }}" == "failure" ]; then
            echo "icon=❌" >> "$GITHUB_OUTPUT"
            echo "summary=Plan failed" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.plan.outputs.exitcode }}" == "2" ]; then
            echo "icon=⚠️" >> "$GITHUB_OUTPUT"
            echo "summary=Changes detected" >> "$GITHUB_OUTPUT"
          else
            echo "icon=✅" >> "$GITHUB_OUTPUT"
            echo "summary=No changes" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `### ${{ steps.status.outputs.icon }} Terraform Plan: \`${{ matrix.env }}\`

            **Result:** ${{ steps.status.outputs.summary }}

            <details><summary>Plan Output</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.event.pull_request.head.ref }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1
